services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-cakeshop}"
      POSTGRES_USER: "${POSTGRES_USER:-cakeshop}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-cakeshop}"
    ports:
      - "5432:5432"
    volumes:
      - cake_shop_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cakeshop} -d ${POSTGRES_DB:-cakeshop}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://cakeshop:cakeshop@db:5432/cakeshop?schema=public}"
      DIRECT_URL: "${DIRECT_URL:-postgresql://cakeshop:cakeshop@db:5432/cakeshop?schema=public}"
      ADMIN_API_KEY: "${ADMIN_API_KEY:-change-me-admin-key}"
      NEXT_PUBLIC_STORE_NAME: "${NEXT_PUBLIC_STORE_NAME:-Сладкий Слой}"
      NODE_ENV: "production"
      PORT: "3000"
    restart: unless-stopped

volumes:
  cake_shop_postgres:
