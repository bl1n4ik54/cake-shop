services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/data/cake-shop.db"
      ADMIN_API_KEY: "${ADMIN_API_KEY:-change-me-admin-key}"
      NEXT_PUBLIC_STORE_NAME: "${NEXT_PUBLIC_STORE_NAME:-Сладкий Слой}"
      NODE_ENV: "production"
      PORT: "3000"
    volumes:
      - cake_shop_data:/app/data
    restart: unless-stopped

volumes:
  cake_shop_data:

